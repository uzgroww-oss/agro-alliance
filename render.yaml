services:
  - type: web
    name: agro-alliance
    runtime: node
    plan: free
    buildCommand: npm install -g bun && bun install && bunx vite build && cd server && bun install
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: JWT_SECRET
        generateValue: true
