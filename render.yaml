services:
  - type: web
    name: agro-alliance
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npx vite build && npm install --prefix server
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: JWT_SECRET
        generateValue: true
